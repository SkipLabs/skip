[package]
name = "skc"
version = "0.3.3"
# Default: all test files compiled into one binary, @exptest functions
# auto-discovered. To use subprocess mode (compile each test individually),
# either set SKC_SUBPROCESS=1 or uncomment the line below.
# tests = ["tests/tests.sk"]
test-harness = "SkcTests.main"

[dependencies]
std = { path = "../prelude" }
cli = { path = "../cli" }
arparser = { path = "../arparser" }

[dev-dependencies]
sktest = { path = "../sktest" }

[[bin]]
name = "skc"
main = "main"

[[bin]]
name = "skfmt"
main = "SkipPrinter.main"
